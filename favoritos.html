<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Favoritos | Marlen Guzmán</title>
    <link rel="icon" type="image/jpeg" href="Logo_MG.jpeg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            padding-top: 80px;
        }

        /* Estilo para el estado vacío */
        .empty-state {
            text-align: center;
            grid-column: 1 / -1;
            /* Ocupa todo el ancho */
            padding: 60px 20px;
            color: #666;
        }

        .empty-state i {
            font-size: 4rem;
            color: #e0e0e0;
            margin-bottom: 20px;
        }

        .section-header {
            margin-bottom: 40px;
        }
    </style>
</head>

<body data-page="favoritos">

    <div id="nav-placeholder"></div>

    <section class="section">
        <div class="container">
            <div class="section-header text-center">
                <span class="overline">Tu Selección</span>
                <h2 class="section-title">Mis Propiedades Guardadas</h2>
                <p style="margin-top: 10px; color: #666;">Aquí encontrarás las propiedades que te han interesado.</p>
            </div>

            <div class="properties-grid" id="favorites-grid">
                <p class="text-center" style="grid-column: 1/-1;">Cargando tus favoritos...</p>
            </div>

            <div style="text-align: center; margin-top: 50px;">
                <a href="venta.html" class="btn-outline">Explorar más Propiedades</a>
            </div>
        </div>
    </section>

    <div id="property-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-body">
                <div class="detail-gallery">
                    <img id="detail-main-img" src="" alt="Imagen Principal" class="detail-main-img">
                    <div id="detail-thumbnails" class="detail-thumbnails"></div>
                </div>
                <div class="detail-info">
                    <div class="detail-header">
                        <div>
                            <span id="detail-operation-badge" class="badge"></span>
                            <h2 id="detail-title"></h2>
                            <p id="detail-location"></p>
                        </div>
                        <div id="detail-price" class="detail-price"></div>
                    </div>
                    <div class="detail-specs">
                        <div class="spec-item"><i class="fas fa-bed"></i> <span id="detail-dorms"></span> Dorm</div>
                        <div class="spec-item"><i class="fas fa-bath"></i> <span id="detail-baths"></span> Baños</div>
                        <div class="spec-item"><i class="fas fa-ruler-combined"></i> <span id="detail-m2"></span> m²
                        </div>
                    </div>
                    <div class="detail-description">
                        <h3>Descripción</h3>
                        <p id="detail-desc"></p>
                    </div>

                    <button class="btn btn-primary btn-block"
                        onclick="document.getElementById('property-modal').style.display='none'; location.href='index.html#contact'">Contactar</button>
                </div>
            </div>
        </div>
    </div>

    


    <div id="footer-placeholder"></div>

    <script src="cargador.js"></script>

    <script type="module" src="script.js"></script>



    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
<script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';
    createChat({
        webhookUrl: 'https://n8n-marlen-auto.onrender.com/webhook/3662a1e4-7936-49cc-ac76-7cdf5942e463/chat'
    });
</script>
</body>

</html>
